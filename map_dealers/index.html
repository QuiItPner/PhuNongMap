<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phu Nong Map</title>
  <meta name="description" content="Bản đồ hiển thị vị trí các đại lý." />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="shortcut icon" type="image/x-icon" href="favicon.png">
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Loading Screen -->
  <div id="loading">
    <div class="spinner"></div>
    <div class="loading-text">Đang tải dữ liệu đại lý…</div>
  </div>

  <!-- Top Bar -->
  <div id="topbar">
    <div>
      <div class="logo">Map Đại Lý Công Ty TNHH Phú Nông </div>
      <div class="subtitle">Xác định tọa độ, vị trí toàn bộ đại lý</div>
    </div>
    <div class="spacer"></div>
    <div class="badges-wrapper" style="display: flex; gap: 10px;">
      <div class="stat-badge"><span class="val" id="stat-total">–</span><span class="lbl">Đại Lý</span></div>
      <div class="stat-badge"><span class="val" id="stat-sheets">–</span><span class="lbl">Khu vực</span></div>
    </div>
  </div>

  <!-- Main Content -->
  <div id="content">
    <!-- Sidebar -->
    <div id="sidebar">
      <div id="sidebar-header">Danh sách đại lý thuộc khu vực</div>
      <div id="search-wrap">
        <input id="search-input" type="text" placeholder="Tìm đại lý, khu vực, địa chỉ…" />
      </div>
      <div id="layers"></div>
    </div>

    <!-- Toggle button -->
    <div id="toggle-sidebar" title="Ẩn/hiện bảng điều khiển">‹</div>

    <!-- Map container -->
    <div id="map"></div>

    <!-- Basemap switcher -->
    <div id="basemap-switcher">
      <button class="bm-btn active" id="bm-osm" onclick="switchBasemap('osm')">OSM</button>
      <button class="bm-btn" id="bm-topo" onclick="switchBasemap('topo')">Topo</button>
      <button class="bm-btn" id="bm-sat" onclick="switchBasemap('sat')">Vệ tinh</button>
      <button class="bm-btn" id="bm-dark" onclick="switchBasemap('dark')">Tối</button>
    </div>

    <!-- Map Legend -->
    <div class="map-legend" id="map-legend"></div>
  </div>

  <!-- Status bar -->
  <div id="status-bar">
    <span id="status-coords">Lat: – · Lng: –</span>
    <span>|</span>
    <span id="status-visible">Hiển thị: – đại lý</span>
    <span>|</span>
    <span>it@phunong.com.vn | Copyright© IT PHU NONG</span>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // ─────────────────────────────────────────────
    //  DYNAMIC CONFIGURATION
    // ─────────────────────────────────────────────
    const colorPalette = [
      '#e63946', '#2196f3', '#ff9800', '#4caf50', '#9c27b0', '#ffeb3b',
      '#06b6d4', '#10b981', '#f43f5e', '#84cc16', '#fb923c', '#d946ef',
      '#6366f1', '#14b8a6', '#f59e0b', '#ec4899', '#8b5cf6', '#ef4444'
    ];

    let SHEET_CONFIG = {};
    let layerGroups = {};   // sheet → markers
    let layerVisible = {};   // sheet → bool
    let allRows = [];   // flat list for search
    let markerRegistry = {};

    // ─────────────────────────────────────────────
    //  MAP INIT
    // ─────────────────────────────────────────────
    const map = L.map('map', {
      center: [10.7, 106.12],
      zoom: 8,
      zoomControl: true,
    });

    // Custom Locate Control
    L.Control.Locate = L.Control.extend({
      onAdd: function (map) {
        const btn = L.DomUtil.create('div', 'leaflet-control-locate leaflet-bar');
        btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="#ef4444">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          <circle cx="12" cy="9" r="2.5" fill="white"/>
        </svg>`;
        btn.title = 'Vị trí của tôi';
        btn.onclick = function (e) {
          e.stopPropagation();
          locateUser();
        };
        return btn;
      }
    });
    new L.Control.Locate({ position: 'topleft' }).addTo(map);

    // Basemap tiles
    const basemaps = {
      osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap', maxZoom: 19
      }),
      topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenTopoMap', maxZoom: 17
      }),
      sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: '© Esri', maxZoom: 19
      }),
      dark: L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png', {
        attribution: '© Stadia Maps', maxZoom: 20
      }),
    };
    basemaps.osm.addTo(map);
    let currentBasemap = 'osm';

    function switchBasemap(name) {
      map.removeLayer(basemaps[currentBasemap]);
      basemaps[name].addTo(map);
      basemaps[name].bringToBack();
      currentBasemap = name;
      document.querySelectorAll('.bm-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('bm-' + name).classList.add('active');
    }

    // Status bar coords
    map.on('mousemove', e => {
      document.getElementById('status-coords').textContent =
        `Lat: ${e.latlng.lat.toFixed(6)} · Lng: ${e.latlng.lng.toFixed(6)}`;
    });

    // ─────────────────────────────────────────────
    //  USER LOCATION (GPS)
    // ─────────────────────────────────────────────
    let userMarker = null;
    let isTracking = false;

    function locateUser() {
      if (!isTracking) {
        map.locate({ watch: true, setView: false, enableHighAccuracy: true });
        isTracking = true;
        document.querySelector('.leaflet-control-locate').style.color = 'var(--accent)';
      } else if (userMarker) {
        map.flyTo(userMarker.getLatLng(), Math.max(map.getZoom(), 16), { duration: 0.5 });
      }
    }

    map.on('locationfound', function (e) {
      if (!userMarker) {
        const icon = L.divIcon({
          className: 'user-loc-marker',
          iconSize: [14, 14],
          iconAnchor: [7, 7]
        });
        userMarker = L.marker(e.latlng, { icon: icon }).addTo(map)
          .bindPopup('<b>Vị trí của bạn</b><br>Sai số: ' + Math.round(e.accuracy) + 'm');
        map.flyTo(e.latlng, 16, { duration: 0.5 });
      } else {
        userMarker.setLatLng(e.latlng);
        userMarker.setPopupContent('<b>Vị trí của bạn</b><br>Sai số: ' + Math.round(e.accuracy) + 'm');
      }
    });

    map.on('locationerror', function (e) {
      alert("Không thể tìm thấy vị trí của bạn. Vui lòng bật vị trí (GPS) và thử lại.\nLỗi: " + e.message);
      isTracking = false;
      document.querySelector('.leaflet-control-locate').style.color = 'var(--text-main)';
    });

    // ─────────────────────────────────────────────
    //  LAYER MANAGEMENT
    // ─────────────────────────────────────────────

    function makeIcon(color, label) {
      const letter = label ? label[0] : '●';
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    <circle cx="14" cy="13" r="12" fill="${color}" stroke="white" stroke-width="2.5"/>
    <text x="14" y="17.5" text-anchor="middle" font-size="10" font-weight="700"
          font-family="Inter,sans-serif" fill="white">${letter}</text>
    <polygon points="9,24 19,24 14,34" fill="${color}" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>`;
      return L.divIcon({
        html: svg,
        className: '',
        iconSize: [28, 36],
        iconAnchor: [14, 36],
        popupAnchor: [0, -36],
      });
    }

    function buildPopup(row, sheetName) {
      const color = SHEET_CONFIG[sheetName].color;
      const label = sheetName;
      const dai_ly = row.dai_ly ? 'Đại Lý ' + row.dai_ly : 'Chưa rõ tên đại lý';
      const dia_chi = row.dia_chi || 'Chưa rõ địa chỉ';
      const lat = row.lat != null ? Number(row.lat).toFixed(6) : '–';
      const lon = row.lon != null ? Number(row.lon).toFixed(6) : '–';

      return `
    <div class="popup-header">
      <span class="popup-badge" style="background:${color}">${label}</span>
      <div class="popup-title">${dai_ly}</div>
    </div>
    <div class="popup-body">
      <div class="popup-row" style="flex-direction: column; gap: 4px; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 8px;">
        <span class="pk">ĐỊA CHỈ:</span>
        <span class="pv" style="text-align:left; color:#fff; font-weight:500;">${dia_chi}</span>
      </div>
      <div class="popup-coords" style="margin-top: 5px;">
        <div class="coord-box" style="background:rgba(${hexToRgb(color)},0.18);border-color:${color}; border-width: 1.5px;">
          <div class="cl">Tọa độ</div>
          <div class="cv"><span class="lbl">Lat:</span> ${lat}</div>
          <div class="cv"><span class="lbl">Lng:</span> ${lon}</div>
        </div>
      </div>
    </div>`;
    }

    function hexToRgb(hex) {
      if (hex.startsWith('#') && hex.length === 7) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `${r},${g},${b}`;
      }
      return '255,255,255'; // fallback
    }

    function isValidCoord(lat, lng) {
      return lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180 &&
        lat !== 0 && lng !== 0;
    }

    function buildLayerForSheet(sheetName, rows) {
      const color = SHEET_CONFIG[sheetName].color;
      const icon = makeIcon(color, sheetName.charAt(0).toUpperCase());
      const markers = L.layerGroup();

      rows.forEach((row, idx) => {
        const lat = row.lat, lon = row.lon;
        if (lat != null && lon != null && isValidCoord(lat, lon)) {
          const key = `${sheetName}__${idx}`;
          const m = L.marker([lat, lon], { icon: icon, title: row.dai_ly || '' })
            .bindPopup(buildPopup(row, sheetName), { maxWidth: 320 });
          m.addTo(markers);
          markerRegistry[key] = m;
        }
      });

      return { markers };
    }

    // ─────────────────────────────────────────────
    //  SIDEBAR RENDERING
    // ─────────────────────────────────────────────
    function renderSidebar(data) {
      const container = document.getElementById('layers');
      container.innerHTML = '';

      const legendEl = document.getElementById('map-legend');
      legendEl.innerHTML = `
    <div class="legend-header" id="legend-header">
      <h4>Chú Giải</h4>
      <span class="legend-toggle" id="legend-toggle">▼</span>
    </div>
    <div class="legend-body" id="legend-body"></div>
  `;
      const legendBody = document.getElementById('legend-body');

      document.getElementById('legend-header').addEventListener('click', () => {
        legendEl.classList.toggle('collapsed');
        const toggle = document.getElementById('legend-toggle');
        toggle.textContent = legendEl.classList.contains('collapsed') ? '▲' : '▼';
      });

      Object.keys(SHEET_CONFIG).forEach(sheetName => {
        const rows = data[sheetName] || [];
        if (!rows.length) return;

        const visible = layerVisible[sheetName] !== false;
        const color = SHEET_CONFIG[sheetName].color;

        // Legend entry
        const lr = document.createElement('div');
        lr.className = 'legend-row';
        lr.innerHTML = `<div class="legend-dot-large" style="background:${color}"></div>
      <span>${sheetName}</span>`;
        legendBody.appendChild(lr);

        const wrapper = document.createElement('div');
        wrapper.className = 'district-wrapper';

        const header = document.createElement('div');
        header.className = 'district-header';
        header.id = `district-header-${sheetName}`;
        header.innerHTML = `
      <div class="layer-checkbox ${visible ? 'checked' : ''}" id="chk-${sheetName}"
           style="border-color:${color};background:${visible ? color : 'transparent'}"></div>
      <div class="layer-dot" style="background:${color}"></div>
      <div class="district-label">
        <div class="district-name">${sheetName}</div>
        <div class="district-count">${rows.length} đại lý</div>
      </div>
      <span class="expand-arrow" id="arrow-${sheetName}">▶</span>`;

        header.querySelector('.layer-checkbox').addEventListener('click', e => {
          e.stopPropagation();
          toggleLayer(sheetName, color);
        });

        header.addEventListener('click', () => {
          const body = document.getElementById(`body-${sheetName}`);
          const arrow = document.getElementById(`arrow-${sheetName}`);
          body.classList.toggle('open');
          arrow.classList.toggle('open');
        });

        wrapper.appendChild(header);

        const body = document.createElement('div');
        body.className = 'district-body';
        body.id = `body-${sheetName}`;

        rows.forEach((row, idx) => {
          const locItem = document.createElement('div');
          locItem.className = 'loc-item';

          const title = row.dai_ly ? `Đại Lý ${row.dai_ly}` : `Đại lý ${idx + 1}`;
          const sub = row.dia_chi || 'Chưa rõ địa chỉ';

          locItem.innerHTML = `
        <div class="loc-dot" style="background:${color}"></div>
        <div class="loc-info">
          <div class="loc-name" title="${title}">${title}</div>
          <div class="loc-sub" title="${sub}">${sub}</div>
        </div>`;

          locItem.addEventListener('click', () => flyToRow(sheetName, idx));
          body.appendChild(locItem);
        });

        wrapper.appendChild(body);
        container.appendChild(wrapper);
      });
    }

    function flyToRow(sheetName, idx) {
      const key = `${sheetName}__${idx}`;
      const m = markerRegistry[key];
      if (!m) return;
      map.closePopup();
      map.flyTo(m.getLatLng(), Math.max(map.getZoom(), 16), { duration: 0.8 });
      setTimeout(() => m.openPopup(), 860);
    }

    function toggleLayer(sheetName, color) {
      const vis = layerVisible[sheetName] !== false;
      layerVisible[sheetName] = !vis;

      const chk = document.getElementById(`chk-${sheetName}`);
      if (layerVisible[sheetName]) {
        chk.classList.add('checked');
        chk.style.background = color;
        if (layerGroups[sheetName]) {
          map.addLayer(layerGroups[sheetName].markers);
        }
      } else {
        chk.classList.remove('checked');
        chk.style.background = 'transparent';
        if (layerGroups[sheetName]) {
          map.removeLayer(layerGroups[sheetName].markers);
        }
      }
      updateStatusVisible();
    }

    function updateStatusVisible() {
      let total = 0;
      Object.entries(layerVisible).forEach(([sh, vis]) => {
        if (vis !== false && layerGroups[sh]) {
          total += layerGroups[sh].markers.getLayers().length;
        }
      });
      document.getElementById('status-visible').textContent = `Hiển thị: ${total} đại lý`;
    }

    // ─────────────────────────────────────────────
    //  SEARCH
    // ─────────────────────────────────────────────
    document.getElementById('search-input').addEventListener('input', function () {
      const q = this.value.toLowerCase().trim();
      if (!q) {
        Object.entries(layerGroups).forEach(([sh, grp]) => {
          if (layerVisible[sh] !== false) {
            if (!map.hasLayer(grp.markers)) map.addLayer(grp.markers);
          }
        });
        return;
      }

      const matches = allRows.filter(r =>
        (r.dai_ly || '').toLowerCase().includes(q) ||
        (r.dia_chi || '').toLowerCase().includes(q) ||
        (r.khu_vuc || '').toLowerCase().includes(q)
      );

      if (matches.length > 0) {
        const first = matches[0];
        if (first.lat && first.lon) {
          map.flyTo([first.lat, first.lon], 16, { duration: 1 });
        }
      }
    });

    // ─────────────────────────────────────────────
    //  STAT COUNTING
    // ─────────────────────────────────────────────
    function computeStats(data) {
      let total = 0;
      let numKeys = 0;
      Object.entries(data).forEach(([sh, rows]) => {
        total += rows.length;
        numKeys++;
      });
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-sheets').textContent = numKeys;
    }

    // ─────────────────────────────────────────────
    //  SIDEBAR TOGGLE
    // ─────────────────────────────────────────────
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('toggle-sidebar');
    let sidebarOpen = true;

    toggleBtn.addEventListener('click', () => {
      sidebarOpen = !sidebarOpen;
      sidebar.classList.toggle('collapsed', !sidebarOpen);
      toggleBtn.style.left = sidebarOpen ? '300px' : '0px';
      toggleBtn.textContent = sidebarOpen ? '‹' : '›';
    });

    // ─────────────────────────────────────────────
    //  MAIN – LOAD DATA
    // ─────────────────────────────────────────────
    fetch('map_data.json')
      .then(r => r.json())
      .then(data => {
        // Generate dynamic SHEET_CONFIG based on API data keys
        const keys = Object.keys(data).sort();
        keys.forEach((sh, i) => {
          SHEET_CONFIG[sh] = {
            color: colorPalette[i % colorPalette.length]
          };

          data[sh].forEach(r => {
            r._sheet = sh;
            allRows.push(r);
          });
        });

        Object.entries(SHEET_CONFIG).forEach(([sheetName]) => {
          const rows = data[sheetName] || [];
          const grp = buildLayerForSheet(sheetName, rows);
          layerGroups[sheetName] = grp;
          layerVisible[sheetName] = true;
          map.addLayer(grp.markers);
        });

        renderSidebar(data);
        computeStats(data);
        updateStatusVisible();

        const bounds = [];
        allRows.forEach(r => {
          if (r.lat && r.lon && isValidCoord(r.lat, r.lon)) bounds.push([r.lat, r.lon]);
        });
        if (bounds.length) map.fitBounds(bounds, { padding: [40, 40] });

        document.getElementById('loading').style.display = 'none';
      })
      .catch(err => {
        console.error(err);
        document.querySelector('.loading-text').textContent = 'Lỗi tải dữ liệu: ' + err.message;
      });
  </script>
</body>

</html>
